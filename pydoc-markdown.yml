loaders:
  - type: python
    search_path:
      - src
    packages:
      - ratingsystems
    # modules:
    #   - ratingsystems
    #   - ratingsystems.RatingSystem

processors:
  - type: filter
    expression: not name.startswith("_")
    documented_only: true
  - type: smart
  - type: crossref

renderer:
  type: markdown
  filename: docs.md
  render_toc: true
  descriptive_class_title: False
