loaders:
  - type: python
    search_path:
      - src
    packages:
      - ratingsystems
    # modules:
    #   - ratingsystems.core.rating_system.RatingSystem

processors:
  - type: filter
    expression: not name.startswith("_")
    documented_only: true
  - type: filter
    expression: "\"Indirection\" not in str(type(obj))"
  # - type: filter
  #   expression: print(obj)
    # documented_only: true
  - type: smart
  - type: crossref

renderer:
  type: markdown
  filename: docs.md
  render_toc: true
  descriptive_class_title: False
  # resolve_reference: True
